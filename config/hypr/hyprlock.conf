# Hyprlock — wallust auto-themed
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# ── Background ────────────────────────────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(000000)
    blur_size = 3
    blur_passes = 2
    noise = 0.01
    contrast = 1.0
    brightness = 0.7
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# ── Clock ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $color14
    font_size = 110
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %-d %B')"
    color = $color13
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $color14
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -60
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color14
    inner_color = $color0
    capslock_color = $color12
    font_color = $foreground
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = Password
    hide_input = false
    rounding = 10
    position = 0, -120
    halign = center
    valign = center
}

# ── Keyboard layout ───────────────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -190
    halign = center
    valign = center
}

# ── Info block — bottom left (single label, no overlap) ──────────────
label {
    monitor =
    text = cmd[update:3600000] cat "$HOME/.cache/.weather_cache" 2>/dev/null
    color = $color13
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 24, 24
    halign = left
    valign = bottom
}

# ── Info block — bottom right ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(hostname)  |  up $(uptime -p | sed 's/up //')"
    color = $color13
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = -24, 24
    halign = right
    valign = bottom
}
